$filemanager = alacritty -e ranger
$nclauncher = swaync-client -t
$lockscreen = hyprlock
$applauncher = rofi -show drun -show-icons # combi -modi window,run,combi -combi-modi window,run
$terminal    = alacritty
$idlehandler = swayidle -w timeout 300 'swaylock -f -c 000000' before-sleep 'swaylock -f -c 000000'
$capturing   = grim -g "$(slurp)" - | swappy -f -
$browser     = zen-browser
$editor      = obsidian
$statusbar   = ~/.config/hypr/scripts/toggle-waybar.sh
